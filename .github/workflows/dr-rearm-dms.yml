name: Rearm AWS to GCP DMS

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run checks only, or recreate the AWS to GCP DMS cycle"
        required: true
        default: preflight
        type: choice
        options:
          - preflight
          - rearm
      gcp_writes_fenced:
        description: "Confirm GCP application database writes are blocked"
        required: true
        default: false
        type: boolean
      confirmation:
        description: "Required for rearm: type REARM_AWS_TO_GCP_DMS"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-dr-switch
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ilpoomjinro
  GCP_REGION: asia-northeast3
  GCP_NETWORK: projects/ilpoomjinro/global/networks/vpc-gcp-prd
  DMS_MIGRATION_JOB: aws-rds-to-cloudsql-dr
  DMS_SOURCE_PROFILE: aws-postgres-source
  DMS_DESTINATION_PROFILE: cloudsql-dr-destination
  CLOUDSQL_INSTANCE: dr-standby-postgres
  GKE_CLUSTER_NAME: gke-prd-cluster
  GKE_CLUSTER_ZONE: asia-northeast3-a
  AWS_REVERSE_REPLICATION_CLEANUP_DOCUMENT: financial-vpc4-cloudsql-reverse-replication-cleanup
  AWS_DR_ROUTER_INSTANCE_ID: ${{ vars.AWS_DR_ROUTER_INSTANCE_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

jobs:
  rearm:
    name: Validate and rearm AWS to GCP DMS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Authenticate to AWS for reverse replication cleanup
        if: inputs.mode == 'rearm'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DR_ROUTE53_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for GKE DR
        run: |
          gcloud container clusters get-credentials "${GKE_CLUSTER_NAME}" \
            --zone "${GKE_CLUSTER_ZONE}" \
            --project "${GCP_PROJECT_ID}"

      - name: Verify GCP write fence
        run: |
          kubectl -n stock-demo get networkpolicy dr-fence-stock-api-egress

      - name: Run DMS rearm preflight
        if: inputs.mode == 'preflight'
        run: |
          scripts/dr/rearm-aws-to-gcp-dms.sh \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --network "${GCP_NETWORK}"

      - name: Validate DMS rearm approval
        if: inputs.mode == 'rearm'
        env:
          GCP_WRITES_FENCED: ${{ inputs.gcp_writes_fenced }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          [[ "${GCP_WRITES_FENCED}" == "true" ]] || {
            echo "Confirm GCP application database writes are blocked before DMS rearm." >&2
            exit 1
          }
          [[ "${CONFIRMATION}" == "REARM_AWS_TO_GCP_DMS" ]] || {
            echo "Confirmation must equal REARM_AWS_TO_GCP_DMS." >&2
            exit 1
          }
          [[ -n "${AWS_DR_ROUTER_INSTANCE_ID}" ]] || {
            echo "Repository Variable AWS_DR_ROUTER_INSTANCE_ID is required for DMS rearm." >&2
            exit 1
          }

      - name: Remove prior Cloud SQL to AWS reverse replication
        if: inputs.mode == 'rearm'
        run: |
          set -euo pipefail
          command_id="$(aws ssm send-command \
            --document-name "${AWS_REVERSE_REPLICATION_CLEANUP_DOCUMENT}" \
            --instance-ids "${AWS_DR_ROUTER_INSTANCE_ID}" \
            --comment "Remove reverse replication before AWS to GCP DMS rearm" \
            --query 'Command.CommandId' \
            --output text)"
          echo "Started reverse-replication cleanup SSM command: ${command_id}"

          for _ in $(seq 1 90); do
            status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${AWS_DR_ROUTER_INSTANCE_ID}" \
              --query Status \
              --output text 2>/dev/null || true)"
            echo "Reverse-replication cleanup status: ${status:-Pending}"
            case "${status}" in
              Success) exit 0 ;;
              Cancelled|Failed|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "${command_id}" \
                  --instance-id "${AWS_DR_ROUTER_INSTANCE_ID}" \
                  --query '{Status:Status,StandardErrorContent:StandardErrorContent}' \
                  --output json >&2 || true
                exit 1 ;;
            esac
            sleep 10
          done

          echo "Timed out waiting for reverse-replication cleanup." >&2
          exit 1

      - name: Recreate AWS to GCP DMS cycle
        if: inputs.mode == 'rearm'
        run: |
          scripts/dr/rearm-aws-to-gcp-dms.sh \
            --execute \
            --gcp-writes-fenced \
            --confirm REARM_AWS_TO_GCP_DMS \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --network "${GCP_NETWORK}"

name: Deploy GKE DR Service

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "AWS ECR image tag to mirror and deploy"
        required: true
        default: "latest"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: gke-dr-service-deploy
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ilpoomjinro
  GCP_REGION: asia-northeast3
  GKE_CLUSTER_NAME: gke-prd-cluster
  GKE_CLUSTER_ZONE: asia-northeast3-a
  ARTIFACT_REPOSITORY: dr-app
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

jobs:
  mirror-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DR_IMAGE_MIRROR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Mirror application images to Artifact Registry
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          AWS_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          GCP_REGISTRY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}"

          aws ecr get-login-password --region "${AWS_REGION}" | \
            docker login --username AWS --password-stdin "${AWS_REGISTRY}"
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

          for component in demo-app-backend demo-app-frontend; do
            source_image="${AWS_REGISTRY}/financial/${component}:${IMAGE_TAG}"
            target_image="${GCP_REGISTRY}/${component}:${IMAGE_TAG}"
            docker pull "${source_image}"
            docker tag "${source_image}" "${target_image}"
            docker push "${target_image}"
          done

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials "${GKE_CLUSTER_NAME}" \
            --zone "${GKE_CLUSTER_ZONE}" \
            --project "${GCP_PROJECT_ID}"

      - name: Configure the static Gateway address
        id: gateway_ip
        run: |
          set -euo pipefail

          gateway_ip="$(gcloud compute addresses describe gke-dr-gateway-ip \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --format='value(address)')"
          test -n "${gateway_ip}"
          echo "address=${gateway_ip}" >> "${GITHUB_OUTPUT}"

      - name: Apply Cloud SQL credentials and DR workload
        env:
          DR_DB_HOST: ${{ vars.GCP_DR_DB_HOST }}
          DR_DB_USER: ${{ secrets.GCP_DR_DB_USER }}
          DR_DB_PASSWORD: ${{ secrets.GCP_DR_DB_PASSWORD }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          : "${DR_DB_HOST:?Set repository variable GCP_DR_DB_HOST first.}"
          : "${DR_DB_USER:?Set repository secret GCP_DR_DB_USER first.}"
          : "${DR_DB_PASSWORD:?Set repository secret GCP_DR_DB_PASSWORD first.}"

          kubectl create namespace stock-demo --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n stock-demo create secret generic stock-api-db \
            --from-literal=DB_HOST="${DR_DB_HOST}" \
            --from-literal=DB_USER="${DR_DB_USER}" \
            --from-literal=DB_PASSWORD="${DR_DB_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -

          cd k8s/stock-demo
          sed -i "s|newTag: latest|newTag: ${IMAGE_TAG}|g" kustomization.yaml
          kubectl apply -k .

      - name: Assign the reserved IP to the Gateway Service
        env:
          GATEWAY_STATIC_IP: ${{ steps.gateway_ip.outputs.address }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            if kubectl -n stock-demo get service stock-gw-istio >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          kubectl -n stock-demo get service stock-gw-istio >/dev/null
          kubectl -n stock-demo patch service stock-gw-istio \
            --type=merge \
            -p "{\"spec\":{\"loadBalancerIP\":\"${GATEWAY_STATIC_IP}\"}}"

      - name: Wait for GKE DR workload
        env:
          GATEWAY_STATIC_IP: ${{ steps.gateway_ip.outputs.address }}
        run: |
          set -euo pipefail
          kubectl -n stock-demo rollout status deployment/stock-api --timeout=5m
          kubectl -n stock-demo rollout status deployment/stock-web --timeout=5m
          kubectl -n stock-demo get hpa -o wide
          kubectl -n stock-demo get gateway stock-gw -o yaml

          for attempt in $(seq 1 30); do
            gateway_ip="$(kubectl -n stock-demo get service stock-gw-istio \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
            if [ "${gateway_ip}" = "${GATEWAY_STATIC_IP}" ]; then
              echo "GKE DR Gateway is using static IP ${gateway_ip}."
              break
            fi
            sleep 10
          done

          test "${gateway_ip}" = "${GATEWAY_STATIC_IP}"
          kubectl -n stock-demo get service stock-gw-istio -o wide

      - name: Verify the application reads promoted Cloud SQL
        run: |
          set -euo pipefail

          cloud_sql_master_instance="$(gcloud sql instances describe dr-standby-postgres \
            --project "${GCP_PROJECT_ID}" \
            --format='value(masterInstanceName)')"

          if [ -n "${cloud_sql_master_instance}" ]; then
            echo "Cloud SQL is a DMS standby replica of ${cloud_sql_master_instance}."
            echo "Skipping application DB-read verification; the next step fences GKE database access."
            exit 0
          fi

          echo "Cloud SQL is standalone. Verifying the GKE application reads Cloud SQL."
          kubectl -n stock-demo port-forward service/stock-web 18080:80 >/tmp/stock-web-port-forward.log 2>&1 &
          PORT_FORWARD_PID=$!
          trap 'kill "${PORT_FORWARD_PID}" >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:18080/api/recommendations >/tmp/recommendations.json; then
              cat /tmp/recommendations.json
              exit 0
            fi
            sleep 2
          done

          cat /tmp/stock-web-port-forward.log || true
          echo "GKE DR service could not read Cloud SQL." >&2
          exit 1

      - name: Fence GKE database access while Cloud SQL is standby
        run: |
          # Keep the warm DR workload deployed, but prevent its API Pods from
          # reaching the DMS replica until an approved failover promotes it.
          bash scripts/dr/fence-gke-writes.sh fence

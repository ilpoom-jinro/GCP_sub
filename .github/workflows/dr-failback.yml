name: DR Failback to AWS

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run checks only, or return Route 53 traffic to AWS"
        required: true
        default: preflight
        type: choice
        options:
          - preflight
          - failback
      gcp_writes_fenced:
        description: "Required only when GCP is already unavailable and cannot be fenced automatically"
        required: true
        default: false
        type: boolean
      gcp_write_fence_mode:
        description: "How to fence GCP application writes before reverse replication"
        required: true
        default: automated
        type: choice
        options:
          - automated
          - already-unavailable
      confirmation:
        description: "Required for failback: type FAILBACK_TO_AWS"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-dr-switch
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ilpoomjinro
  GCP_REGION: asia-northeast3
  DMS_MIGRATION_JOB: aws-rds-to-cloudsql-dr
  CLOUDSQL_INSTANCE: dr-standby-postgres
  GKE_CLUSTER_NAME: gke-prd-cluster
  GKE_CLUSTER_ZONE: asia-northeast3-a
  AWS_DR_WRITE_FENCE_PROJECT: financial-service-dr-write-fence
  AWS_REVERSE_REPLICATION_DOCUMENT: financial-vpc4-cloudsql-reverse-replication
  AWS_FAILBACK_CREDENTIALS_SECRET: financial-cloudsql-failback-credentials
  AWS_DR_ROUTER_INSTANCE_ID: ${{ vars.AWS_DR_ROUTER_INSTANCE_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

jobs:
  failback:
    name: Validate and fail back to AWS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Authenticate to AWS for Route 53
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DR_ROUTE53_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS application endpoint
        run: curl --fail --silent --show-error --retry 3 https://aws.ilpumjinro.store/ >/dev/null

      - name: Run database failback preflight
        run: |
          scripts/dr/failback-preflight.sh \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --job "${DMS_MIGRATION_JOB}" \
            --instance "${CLOUDSQL_INSTANCE}"

      - name: Show Route 53 state
        run: scripts/dr/route53-primary-health.sh status

      - name: Validate failback approval
        if: inputs.mode == 'failback'
        env:
          GCP_WRITES_FENCED: ${{ inputs.gcp_writes_fenced }}
          GCP_WRITE_FENCE_MODE: ${{ inputs.gcp_write_fence_mode }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          if [[ "${GCP_WRITE_FENCE_MODE}" == "already-unavailable" ]]; then
            [[ "${GCP_WRITES_FENCED}" == "true" ]] || {
              echo "Confirm GCP writes are already unavailable before failback." >&2
              exit 1
            }
          fi
          [[ "${CONFIRMATION}" == "FAILBACK_TO_AWS" ]] || {
            echo "Confirmation must equal FAILBACK_TO_AWS." >&2
            exit 1
          }
          [[ -n "${AWS_DR_ROUTER_INSTANCE_ID}" ]] || {
            echo "Repository Variable AWS_DR_ROUTER_INSTANCE_ID is required for failback." >&2
            exit 1
          }

      - name: Configure kubectl for GKE DR
        if: inputs.mode == 'failback' && inputs.gcp_write_fence_mode == 'automated'
        run: |
          gcloud container clusters get-credentials "${GKE_CLUSTER_NAME}" \
            --zone "${GKE_CLUSTER_ZONE}" \
            --project "${GCP_PROJECT_ID}"

      - name: Fence GCP application database writes
        if: inputs.mode == 'failback' && inputs.gcp_write_fence_mode == 'automated'
        run: bash scripts/dr/fence-gke-writes.sh fence

      - name: Store one-time reverse replication credentials
        if: inputs.mode == 'failback'
        env:
          CLOUDSQL_ADMIN_USER: ${{ secrets.GCP_DR_DB_USER }}
          CLOUDSQL_ADMIN_PASSWORD: ${{ secrets.GCP_DR_DB_PASSWORD }}
        run: |
          set -euo pipefail
          : "${CLOUDSQL_ADMIN_USER:?GCP_DR_DB_USER is required}"
          : "${CLOUDSQL_ADMIN_PASSWORD:?GCP_DR_DB_PASSWORD is required}"

          replication_password="$(openssl rand -base64 48 | tr -d '\n' | tr '/+' 'Aa' | cut -c1-48)"
          secret_payload="$(jq -cn \
            --arg cloudsql_admin_user "${CLOUDSQL_ADMIN_USER}" \
            --arg cloudsql_admin_password "${CLOUDSQL_ADMIN_PASSWORD}" \
            --arg replication_password "${replication_password}" \
            '{cloudsql_admin_user: $cloudsql_admin_user, cloudsql_admin_password: $cloudsql_admin_password, replication_password: $replication_password}')"

          aws secretsmanager put-secret-value \
            --secret-id "${AWS_FAILBACK_CREDENTIALS_SECRET}" \
            --secret-string "${secret_payload}" >/dev/null

      - name: Rebuild AWS RDS and start reverse replication
        if: inputs.mode == 'failback'
        run: |
          set -euo pipefail

          command_id="$(aws ssm send-command \
            --document-name "${AWS_REVERSE_REPLICATION_DOCUMENT}" \
            --instance-ids "${AWS_DR_ROUTER_INSTANCE_ID}" \
            --comment "Controlled DR failback Cloud SQL to RDS reverse replication" \
            --query 'Command.CommandId' \
            --output text)"
          echo "Started reverse-replication SSM command: ${command_id}"

          for _ in $(seq 1 180); do
            status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${AWS_DR_ROUTER_INSTANCE_ID}" \
              --query Status \
              --output text 2>/dev/null || true)"
            echo "Reverse-replication status: ${status:-Pending}"
            case "${status}" in
              Success) exit 0 ;;
              Cancelled|Failed|TimedOut) \
                aws ssm get-command-invocation \
                  --command-id "${command_id}" \
                  --instance-id "${AWS_DR_ROUTER_INSTANCE_ID}" \
                  --query '{Status:Status,StandardErrorContent:StandardErrorContent}' \
                  --output json >&2 || true
                exit 1 ;;
            esac
            sleep 10
          done

          echo "Timed out waiting for reverse replication." >&2
          exit 1

      - name: Restore AWS application database writes
        if: inputs.mode == 'failback'
        run: |
          set -euo pipefail
          build_id="$(aws codebuild start-build \
            --project-name "${AWS_DR_WRITE_FENCE_PROJECT}" \
            --environment-variables-override name=DR_WRITE_FENCE_ACTION,value=unfence,type=PLAINTEXT \
            --query 'build.id' --output text)"
          echo "Started AWS write-unfence build: ${build_id}"

          for _ in $(seq 1 90); do
            status="$(aws codebuild batch-get-builds --ids "${build_id}" \
              --query 'builds[0].buildStatus' --output text)"
            echo "AWS write-unfence status: ${status}"
            case "${status}" in
              SUCCEEDED) exit 0 ;;
              FAILED|FAULT|STOPPED|TIMED_OUT) exit 1 ;;
            esac
            sleep 10
          done

          echo "Timed out waiting for the AWS write-unfence build." >&2
          exit 1

      - name: Return Route 53 traffic to AWS
        if: inputs.mode == 'failback'
        run: scripts/dr/route53-primary-health.sh failback

      - name: Verify public traffic is served
        if: inputs.mode == 'failback'
        run: curl --fail --silent --show-error --retry 6 --retry-delay 10 https://ilpumjinro.store/ >/dev/null

      - name: Show final DR state
        if: always()
        run: scripts/dr/route53-primary-health.sh status || true

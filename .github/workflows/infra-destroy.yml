name: "Terraform Destroy (Manual)"
on:
  workflow_dispatch: # 수동 실행 트리거!

jobs:
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest

    # 👇 [필수] Apply 파일과 완벽하게 똑같이 환경변수와 경로를 매칭해줍니다!
    env:
      TF_VAR_org_id: ${{ secrets.GCP_ORG_ID }}
      TF_VAR_project_number: ${{ secrets.GCP_PROJECT_NUMBER }}
      TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}

    defaults:
      run:
        working-directory: ./infra/Ecc

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.TF_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      # base 네트워크를 삭제하기 전에 별도 state로 관리되는 GKE부터 제거합니다.
      - name: Terraform Init (GKE)
        run: terraform init
        working-directory: ./infra/GKE

      - name: Terraform Destroy (GKE)
        run: terraform destroy -auto-approve -input=false
        working-directory: ./infra/GKE

      - name: Terraform Init (Base)
        run: terraform init

      - name: Terraform Destroy (Base)
        run: terraform destroy -auto-approve -input=false

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: stock-gw
  namespace: stock-demo
  annotations:
    # Istio creates a public GCP load balancer for this gateway.
    networking.istio.io/service-type: LoadBalancer
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: gcp-dr-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stock-route
  namespace: stock-demo
spec:
  parentRefs:
    - name: stock-gw
  rules:
    - backendRefs:
        - name: stock-web
          port: 80

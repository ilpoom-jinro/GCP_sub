apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - backend.yaml
  - frontend.yaml
  - autoscaling.yaml
  - gateway.yaml

images:
  - name: stock-api-image
    newName: asia-northeast3-docker.pkg.dev/ilpoomjinro/dr-app/demo-app-backend
    newTag: latest
  - name: stock-web-image
    newName: asia-northeast3-docker.pkg.dev/ilpoomjinro/dr-app/demo-app-frontend
    newTag: latest

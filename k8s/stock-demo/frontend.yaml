apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-web-deployment-info
  namespace: stock-demo
data:
  deployment.json: |
    {
      "environment": "GCP",
      "label": "GCP DR",
      "region": "asia-northeast3"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-web
  namespace: stock-demo
  labels:
    app: stock-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-web
  template:
    metadata:
      labels:
        app: stock-web
      annotations:
        ilpoomjinro.store/deployment-info-version: "v1"
    spec:
      containers:
        - name: stock-web
          image: stock-web-image:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: deployment-info
              mountPath: /usr/share/nginx/html/deployment.json
              subPath: deployment.json
              readOnly: true
      volumes:
        - name: deployment-info
          configMap:
            name: stock-web-deployment-info
---
apiVersion: v1
kind: Service
metadata:
  name: stock-web
  namespace: stock-demo
spec:
  type: ClusterIP
  selector:
    app: stock-web
  ports:
    - name: http
      port: 80
      targetPort: http

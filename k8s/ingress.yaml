apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gce-ingress
  namespace: default
  annotations:
    # 이 주석 한 줄이 GCP의 외부 로드밸런서를 자동 생성하게 만듭니다.
    kubernetes.io/ingress.class: "gce"
    # HTTP 트래픽을 HTTPS로 강제 전환하는 보안 설정 (필요시 활성화)
    # networking.gke.io/v1beta1.FrontendConfig: "ingress-security-config"
spec:
  defaultBackend:
    service:
      name: my-app-service # 나중에 띄울 앱 서비스 이름
      port:
        number: 80